name: Test dependency installation

on: [pull_request_target, push]

permissions:
  contents: write
  actions: write

jobs:
  snapshots:
    runs-on: ubuntu-slim

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false

      - name: Install dependencies
        run: npm i
